name: CI / CD

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings 0

  # ────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    permissions:
      contents: read
    env:
      # Provide stub env vars so Next.js can build without real secrets
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          path: .next/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agentforge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────
  # Optional: deploy to Vercel via Vercel CLI when pushing to main
  # Uncomment and add VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID
  # to repository secrets.
